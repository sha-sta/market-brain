name: CI

# Lint + typecheck + unit tests. These need no database, secrets, or network, so they run on every
# push and PR. The production build runs on Vercel (it needs runtime env), and integration/e2e tests
# run locally against a real test database; neither is part of CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
